name: Deploy Docusaurus site to GitHub Pages

on:
  push:
    branches:
      - main  # 当 main 分支有推送时触发部署
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
    - name: Tune Git for unstable network
      run: |
        git config --global http.postBuffer 524288000
        git config --global http.version HTTP/1.1
        git config --global http.lowSpeedLimit 1000
        git config --global http.lowSpeedTime 600

    - name: Checkout repository
      id: checkout
      uses: actions/checkout@v4
      continue-on-error: true
      timeout-minutes: 8
      with:
        fetch-depth: 1
        lfs: false
        submodules: false

    - name: Retry checkout repository
      if: steps.checkout.outcome != 'success'
      uses: actions/checkout@v4
      timeout-minutes: 8
      with:
        fetch-depth: 1
        lfs: false
        submodules: false

    - name: Clean install dependencies
      run: |
        rm -rf node_modules
        npm ci

    - name: Build Docusaurus site
      run: npm run build

    - name: Debug env variables
      run: |
        echo "GIT_USER: ${{ secrets.GITHUB_ACTOR }}"
        echo "GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}"
        echo "GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}"

        
    - name: Set up Git config
      run: |
        git config --global user.email "liql01@qq.com"
        git config --global user.name "liqinglian01"
        
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan github.com >> ~/.ssh/known_hosts

    - name: Deploy to GitHub Pages
      run: USE_SSH=true npm run deploy